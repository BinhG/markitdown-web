<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkItDown Web — Universal Converter</title>
    <meta name="description" content="Convert any file, document, or URL into pristine Markdown using Microsoft's MarkItDown.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --surface-color: #1a1d24;
            --surface-hover: #222630;
            --border-color: #2e3440;
            --text-primary: #f8f9fa;
            --text-secondary: #a0a6b1;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --error-color: #ef4444;
            --success-color: #10b981;
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(180deg, rgba(26,29,36,0.8) 0%, rgba(15,17,21,1) 100%);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        @media (max-width: 900px) {
            main { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }

        .panel {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 600px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .tab-btn {
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
            box-shadow: var(--shadow-glow);
        }

        .tab-content { display: none; flex-direction: column; gap: 1rem; flex: 1; }
        .tab-content.active { display: flex; }

        /* Drop Zone */
        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-md);
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .drop-zone-icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .drop-zone p { color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem; }
        .drop-zone strong { color: var(--text-primary); }

        /* Inputs */
        input[type="text"], textarea {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            resize: vertical;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        textarea { min-height: 200px; }

        /* Submit Button */
        .submit-btn {
            padding: 0.75rem 1.5rem;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            box-shadow: var(--shadow-glow);
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
            position: absolute;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Output Panel */
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .output-header h2 { font-size: 1.1rem; font-weight: 600; }

        .output-actions { display: flex; gap: 0.5rem; }

        .copy-btn, .download-btn {
            padding: 0.4rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--surface-hover);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .copy-btn:hover, .download-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .output-stats {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .editor-wrapper {
            flex: 1;
            overflow: auto;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1rem;
        }

        .editor-wrapper pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .editor-wrapper code {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 1000;
            max-width: 350px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success { background: #10b981; color: white; }
        .toast.error { background: #ef4444; color: white; }

        /* File info */
        .file-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
            padding: 0.5rem 0.75rem;
            background: var(--bg-color);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: none;
        }

        footer {
            text-align: center;
            padding: 1rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
        }

        footer a { color: var(--accent-primary); text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <h1>MarkItDown Web</h1>
        <p class="subtitle">Convert any file, URL, or text to clean Markdown — powered by <a href="https://github.com/microsoft/markitdown" target="_blank" style="color: var(--accent-primary); text-decoration: none;">Microsoft MarkItDown</a></p>
    </header>

    <main>
        <!-- Left Panel: Input -->
        <div class="panel">
            <div class="tabs">
                <button class="tab-btn active" data-tab="file">File Upload</button>
                <button class="tab-btn" data-tab="url">URL</button>
                <button class="tab-btn" data-tab="text">Text / HTML</button>
            </div>

            <!-- File Tab -->
            <div class="tab-content active" id="tab-file">
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-icon">&#128196;</div>
                    <strong>Drop file here or click to browse</strong>
                    <p>PDF, DOCX, PPTX, XLSX, HTML, CSV, JSON, images, audio, ZIP and more</p>
                    <p style="margin-top: 0.5rem; font-size: 0.8rem;">Max size: 50 MB</p>
                </div>
                <input type="file" id="fileInput" style="display:none">
                <div class="file-info" id="selectedFileInfo"></div>
                <button class="submit-btn" id="btnFile" disabled>
                    <span class="btn-text">Convert File</span>
                    <div class="spinner"></div>
                </button>
            </div>

            <!-- URL Tab -->
            <div class="tab-content" id="tab-url">
                <input type="text" id="urlInput" placeholder="https://example.com/article">
                <button class="submit-btn" id="btnUrl">
                    <span class="btn-text">Convert URL</span>
                    <div class="spinner"></div>
                </button>
            </div>

            <!-- Text Tab -->
            <div class="tab-content" id="tab-text">
                <textarea id="textInput" placeholder="Paste raw HTML or plain text here..."></textarea>
                <div style="display: flex; gap: 1rem;">
                    <label style="color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" name="textFormat" value="html" checked> HTML
                    </label>
                    <label style="color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;">
                        <input type="radio" name="textFormat" value="text"> Plain Text
                    </label>
                </div>
                <button class="submit-btn" id="btnText">
                    <span class="btn-text">Convert Text</span>
                    <div class="spinner"></div>
                </button>
            </div>
        </div>

        <!-- Right Panel: Output -->
        <div class="panel">
            <div class="output-header">
                <h2>Markdown Output</h2>
                <div class="output-actions">
                    <button class="download-btn" id="downloadBtn">&#8595; Download .md</button>
                    <button class="copy-btn" id="copyBtn">Copy</button>
                </div>
            </div>
            <div class="output-stats" id="outputStats">0 lines &bull; 0 characters</div>
            
            <div class="editor-wrapper">
                <pre><code id="outputCode">Markdown will appear here...</code></pre>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        // Tab Switching Logic
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            });
        });

        // Toast Notification
        const toast = document.getElementById('toast');
        let toastTimeout;
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Output Handling
        const outputCode = document.getElementById('outputCode');
        const outputStats = document.getElementById('outputStats');
        const copyBtn = document.getElementById('copyBtn');

        let lastMarkdown = '';
        let lastFilename = 'converted.md';

        function setOutput(markdown, lines, chars) {
            if (!markdown) markdown = 'No content extracted.';
            lastMarkdown = markdown;
            outputCode.textContent = markdown;
            const lineCount = lines != null ? lines : markdown.split('\n').length;
            const charCount = chars != null ? chars : markdown.length;
            outputStats.textContent = `${lineCount} lines \u2022 ${charCount.toLocaleString()} characters`;
        }

        // ---------------------------------------------------------------
        // Copy — uses Clipboard API on HTTPS, execCommand fallback on HTTP
        // ---------------------------------------------------------------
        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            }
            // Fallback for HTTP / non-secure context
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try {
                const ok = document.execCommand('copy');
                document.body.removeChild(ta);
                return ok ? Promise.resolve() : Promise.reject(new Error('execCommand returned false'));
            } catch (e) {
                document.body.removeChild(ta);
                return Promise.reject(e);
            }
        }

        copyBtn.addEventListener('click', () => {
            const text = outputCode.textContent;
            if (!text || text === 'Markdown will appear here...') {
                showToast('Nothing to copy yet', 'error');
                return;
            }
            copyToClipboard(text)
                .then(() => showToast('Copied to clipboard!', 'success'))
                .catch(() => showToast('Copy failed \u2014 try selecting text manually', 'error'));
        });

        // ---------------------------------------------------------------
        // Download — append anchor to DOM before click (Firefox requirement)
        // ---------------------------------------------------------------
        const downloadBtn = document.getElementById('downloadBtn');
        downloadBtn.addEventListener('click', () => {
            if (!lastMarkdown || lastMarkdown === 'Markdown will appear here...') {
                showToast('Nothing to download yet', 'error');
                return;
            }
            try {
                const blob = new Blob([lastMarkdown], { type: 'text/markdown;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = lastFilename;
                a.style.display = 'none';
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                showToast('Downloaded!', 'success');
            } catch (e) {
                showToast('Download failed: ' + e.message, 'error');
            }
        });

        // Loading State
        function setLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            const text = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.spinner');
            
            btn.disabled = isLoading;
            if (isLoading) {
                spinner.style.display = 'block';
                text.style.opacity = '0';
            } else {
                spinner.style.display = 'none';
                text.style.opacity = '1';
            }
        }

        // File Drag & Drop
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const btnFile = document.getElementById('btnFile');
        const selectedFileInfo = document.getElementById('selectedFileInfo');
        let currentFile = null;

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            currentFile = file;
            selectedFileInfo.style.display = 'block';
            selectedFileInfo.textContent = `Selected: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
            btnFile.disabled = false;
        }

        // API Calls
        const API_BASE = '/api/convert';

        btnFile.addEventListener('click', async () => {
            if (!currentFile) return;
            setLoading('btnFile', true);
            
            const formData = new FormData();
            formData.append('file', currentFile);

            try {
                const res = await fetch(`${API_BASE}/file`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (res.ok) {
                    lastFilename = data.filename
                        ? data.filename.replace(/\.[^.]+$/, '') + '.md'
                        : 'converted.md';
                    setOutput(data.markdown, data.line_count, data.char_count);
                    showToast('File converted successfully!');
                } else {
                    showToast(data.error || 'Conversion failed', 'error');
                }
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                setLoading('btnFile', false);
            }
        });

        const btnUrl = document.getElementById('btnUrl');
        const urlInput = document.getElementById('urlInput');

        btnUrl.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) return;
            setLoading('btnUrl', true);

            try {
                const res = await fetch(`${API_BASE}/url`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                
                if (res.ok) {
                    lastFilename = 'converted.md';
                    setOutput(data.markdown, data.line_count, data.char_count);
                    showToast('URL converted successfully!');
                } else {
                    showToast(data.error || 'Conversion failed', 'error');
                }
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                setLoading('btnUrl', false);
            }
        });

        const btnText = document.getElementById('btnText');
        const textInput = document.getElementById('textInput');

        btnText.addEventListener('click', async () => {
            const text = textInput.value.trim();
            if (!text) return;
            setLoading('btnText', true);

            const format = document.querySelector('input[name="textFormat"]:checked').value;

            try {
                const res = await fetch(`${API_BASE}/text`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, format })
                });
                const data = await res.json();
                
                if (res.ok) {
                    lastFilename = 'converted.md';
                    setOutput(data.markdown, data.line_count, data.char_count);
                    showToast('Text converted successfully!');
                } else {
                    showToast(data.error || 'Conversion failed', 'error');
                }
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                setLoading('btnText', false);
            }
        });

    </script>
</body>
</html>
